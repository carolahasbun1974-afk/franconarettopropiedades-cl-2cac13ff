<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Franco Naretto Propiedades</title>
    <script>
      // SPA fallback para GitHub Pages:
      // Redirige cualquier ruta profunda (ej. /vender) a la raíz
      // preservando la ruta para que React Router la maneje.
      (function () {
        var path = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem('spa-redirect', path);
        window.location.replace('/');
      })();
    </script>
  </head>
  <body></body>
</html>
